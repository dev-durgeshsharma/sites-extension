<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulk URL Opener</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 15px;
    }

    textarea {
      width: 100%;
      height: 300px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      resize: vertical;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #linksContainer {
      margin-top: 20px;
    }

    .url-link {
      display: block;
      margin-bottom: 10px;
      padding: 12px;
      background: #f1f1f1;
      border-radius: 8px;
      text-decoration: none;
      color: #000;
      word-break: break-all;
    }

    .url-link:hover {
      background: #e2e2e2;
    }

    .note {
      margin-top: 20px;
      color: #555;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Bulk URL Opener</h1>

    <textarea id="urlBox" placeholder="Paste one URL per line..."></textarea>

    <button onclick="generateLinks()">Generate Clickable Links</button>

    <div id="linksContainer"></div>

    <div class="note">
      • Paste one URL per line.<br>
      • Click generated links one-by-one to open them.<br>
      • https:// is added automatically if missing.
    </div>
  </div>

  <script>
    function generateLinks() {
      const text = document.getElementById('urlBox').value;
      const container = document.getElementById('linksContainer');

      container.innerHTML = '';

      const urls = text
        .split(/\r?\n/)
        .map(url => url.trim())
        .filter(url => url.length > 0);

      if (urls.length === 0) {
        alert('Please paste at least one URL.');
        return;
      }

      urls.forEach((url, index) => {
        let finalUrl = url;

        if (!url.startsWith('http://') && !url.startsWith('https://')) {
          finalUrl = 'https://' + url;
        }

        const link = document.createElement('a');
        link.href = finalUrl;
        link.target = '_blank';
        link.className = 'url-link';
        link.textContent = `Open Link ${index + 1} → ${finalUrl}`;

        container.appendChild(link);
      });
    }
  </script>

</body>
</html>
